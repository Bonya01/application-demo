<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Library</a>
        <div class="collapse navbar-collapse" id="navCollapse">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/books}">Books</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="app-container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2>Books</h2>
        <a class="btn btn-success" th:href="@{/books/add}">Add Book</a>
    </div>

    <form class="mt-3" th:action="@{/books/search}" method="get">
        <div class="input-group">
            <input type="text" name="q" class="form-control" placeholder="Search by title, author, ISBN"/>
            <button class="btn btn-outline-secondary">Search</button>
        </div>
    </form>

    <div class="mt-3">
        <table class="table">
            <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>ISBN</th>
                <th>Available</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${books}">
                <td th:text="${b.title}"></td>
                <td th:text="${b.author}"></td>
                <td th:text="${b.isbn}"></td>
                <td th:text="${b.availableCopies}"></td>
                <td>
                    <a th:href="@{'/books/edit/' + ${b.id}}" class="btn btn-sm btn-primary">Edit</a>
                    <a th:href="@{'/books/delete/' + ${b.id}}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="footer">
        <small>Library Management System — simple demo UI</small>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
